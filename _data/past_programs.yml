- title: Beyond the Banned Shelf - Censorship and Free Expression
  date: Friday, May 8, 2026
  description: We begin from a core belief - that the pursuit of knowledge and the open exchange of ideas are cornerstones of our community 
    and our faith. But what happens when ideas are challenged, when books are deemed "unsuitable," and when free expression becomes a 
    battleground?<br><br>Thank you to everyone who joined us for our may meeting. It was a thoughtful and timely deep dive into the complex, 
    often heated, issue of censorship and book banning. Carole Woods helped us understand the history, the methods, and the legal implications 
    of fighting for access to diverse and challenging ideas. We left the discussion with a clearer, if more challenging, understanding of the stakes.
  image: carole_woods.jpeg
  image_alt: image of Carole Woods
  speaker: Carole Woods
  biography: Carole is a retired Reading Specialist with a profound passion for children’s and adult literature. Since retiring, 
    she has maintained her commitment to lifelong learning through the Osher Lifelong Learning Institutes (Olli) at CSUEB. Carole 
    has researched the issue of censorship extensively, utilizing resources from the American Library Association and California 
    Teachers of English, and was excellent guide through the landscape of book challenges nationwide.
