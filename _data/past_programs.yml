- title: The Courage to Look
  date: Friday, January 9, 2026
  description: Rev. Leslie Takahashi, the Lead Minister from Mount Diablo Unitarian Universalist Church in Walnut Creek, California, 
    delivered an insightful talk at our brown bag lunch program on Friday, January 9th. The event took place in the Vista Room of 
    the Hillside Complex at Rossmoor.
    <br><br>
    Titled "The Courage to Look - Why our values call us to keep on paying attention and how we can find the stamina to do so," 
    Rev. Takahashi's presentation resonated deeply with our community. The talk focused on fostering resilience to sustain focus 
    and dedication amidst long-term challenges, offering valuable strategies for UUoR members to reflect, connect, and draw 
    inspiration as they navigate the complexities of our world together.
    <br><br>
    Rev. Takahashi's talk was followed by a lively Q&A session, allowing attendees to engage further with the topic and share their perspectives.
  image: leslie_takahashi.jpeg
