- title: Refugee Education and Learning International
  date: Friday, March 13, 2026
  description: On Friday, March 13th, we hosted a deeply moving brown bag lunch presentation featuring Dr. Cecelia Wambach of 
    Refugee Education and Learning International (REAL). <br><br>
     Dr. Wambach’s presentation provided a comprehensive overview of REAL International's history, its current initiatives, and the 
     ongoing challenges faced by refugees today. She was joined by Soghra Sadaqat, a refugee from Afghanistan who shared her powerful 
     personal story of benefiting from REAL International’s programs.<br><br>REAL International, established in 2017, began with a 
     vital mission to provide education to refugee children and youth on the Greek island of Lesvos following the EU’s border closure 
     in 2016. Starting with volunteer educators teaching subjects like math, science, and English, REAL quickly expanded to include 
     a Girls Empowerment Program offering swimming and biking lessons. In response to the COVID-19 pandemic, REAL developed a Virtual 
     Learning Program in 2020, connecting volunteer educators with students across multiple countries.  The organization further 
     launched a Scholarship Fund in 2021 and, most recently, in 2023, began offering virtual teaching to girls and young women in 
     Afghanistan, currently supporting 13 teachers and 24 students through their Virtual Teaching Program. REAL continues its vital 
     mission to empower refugees through education, skill-building, and providing opportunities for personal growth.
  image: Cecelia_Wambach.jpeg
  image_alt: image of Cecelia Wambach
  speaker: Dr. Cecelia Wambach
  biography: Dr. Cecelia Wambach spent most of her working life as a Math Education Professor at San Francisco State University. 
        She has held diverse roles in education - teacher, principal, workshop leader, and student teacher supervisor. She has a 
        TESOL credential (Teaching English as a Second Language) and is a professional artist.
- title: False Gospel - Christian Nationalism in Modern America.
  date: Friday, February 13, 2026
  description: The February 2026 meeting was an enlightening brown bag lunch presentation in the Vista Room of the Hillside Complex at Rossmoor. 
    Our esteemed guest speaker, Aiden McMahon, Intern Minister at the Mount Diablo Unitarian Universalist Church in Walnut Creek, California, 
    delivered a comprehensive talk on Christian Nationalism.<br><br>Aiden meticulously traced the origins of this ideology and elucidated 
    its evolution into its current form. The presentation was designed to arm attendees with the necessary knowledge to identify and engage 
    thoughtfully with Christian Nationalism, an increasingly pervasive belief system.<br><br>For those of faith and conscience, grasping 
    the influence of Christian Nationalism on contemporary American society is of paramount importance. Aiden McMahon's insightful presentation 
    offered a golden opportunity for reflection and dialogue, thereby deepening our collective understanding within our diverse community.
    <br><br>Aiden’s slides are available here as a <a href="assets/pdfs/False Gospel - Christian Nationalism in Modern America.pdf" target="_blank">PDF</a> 
    or a <a href="assets/pdfs/False Gospel - Christian Nationalism in Modern America.pptx" target="_blank">PowerPoint file</a>.
  image: aiden_mcmahon.jpeg
  image_alt: image of Aiden McMahon
  speaker: Aiden McMahon
  biography: Aiden McMahon is the current Intern Minister at Mt. Diablo Unitarian Universalist Church in Walnut Creek, CA. 
    Born and raised in Northern New England, he received his M. Div. from the Candler School of Theology at Emory University 
    in Atlanta, GA, which is where he first encountered Unitarian Universalism. Having had an upbringing strongly influenced 
